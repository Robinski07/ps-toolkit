server {
    listen 80;
    server_name ps-toolkit.robinski.ch;

    root /usr/share/nginx/html;

    location = / {
        default_type application/octet-stream;
        add_header Content-Disposition 'attachment; filename="toolkit.ps1"';
        try_files /toolkit.ps1 =404;
    }

    location / {
        try_files $uri $uri/ =404;
    }
}